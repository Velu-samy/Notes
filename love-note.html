    background-size: cover;
    background-position: center 25%;
    opacity: 0.16;
    filter: saturate(0.7) brightness(0.9);
    z-index: 0;
    pointer-events: none;
  }
  .bg-photo::after{
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 30%, rgba(24,8,16,0.3) 0%, var(--wine-deep) 85%);
  }

  /* floating ambient particles */
  .spark{
    position: absolute;
    bottom: -10px;
    font-size: 14px;
    color: var(--rose);
    opacity: 0.55;
    animation: float 9s linear infinite;
    user-select: none;
    pointer-events: none;
    z-index: 1;
  }
  @keyframes float{
    0%{ transform: translateY(0) scale(0.8); opacity: 0; }
    10%{ opacity: 0.6; }
    90%{ opacity: 0.4; }
    100%{ transform: translateY(-110vh) scale(1.1); opacity: 0; }
  }

  /* the scratch card */
  .scratch-wrap{
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    transition: opacity 0.6s ease, transform 0.6s ease;
    z-index: 2;
  }
  .scratch-wrap.hide{
    opacity: 0;
    transform: scale(1.15);
    pointer-events: none;
  }
  .card{
    width: 300px;
    max-width: 82vw;
    border-radius: 14px;
    background: linear-gradient(150deg, #4a2030, #2a1018);
    border: 1px solid rgba(211,168,106,0.45);
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    padding: 16px 16px 18px;
  }
  .card-top{
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 0.82rem;
    letter-spacing: 1.5px;
    color: var(--gold);
    text-transform: uppercase;
    opacity: 0.85;
    margin-bottom: 10px;
  }
  .card-panel{
    position: relative;
    height: 130px;
    border-radius: 8px;
    overflow: hidden;
    background: #1c0c12;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .hidden-text{
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1.1rem;
    color: var(--rose);
    text-align: center;
    padding: 0 14px;
  }
  .card-panel canvas{
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    cursor: grab;
    touch-action: none;
  }
  .card-bottom{
    margin-top: 12px;
    text-align: center;
    font-size: 0.95rem;
    color: var(--blush);
    opacity: 0.75;
    font-style: italic;
  }
  .hint{
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1rem;
    letter-spacing: 0.5px;
    color: var(--gold);
    opacity: 0.85;
    text-align: center;
  }
  @keyframes pulse{
    0%, 100%{ opacity: 0.5; }
    50%{ opacity: 1; }
  }

  /* the letter */
  .letter{
    position: absolute;
    max-width: 560px;
    width: 88vw;
    max-height: 82vh;
    overflow-y: auto;
    background: linear-gradient(180deg, #3a1420, #24101a);
    border: 1px solid rgba(211,168,106,0.35);
    border-radius: 6px;
    padding: 44px 38px 38px;
    opacity: 0;
    transform: scale(0.85);
    pointer-events: none;
    transition: opacity 0.8s ease, transform 0.8s ease;
    box-shadow: 0 30px 80px rgba(0,0,0,0.55);
    z-index: 3;
  }
  .letter.show{
    opacity: 1;
    transform: scale(1);
    pointer-events: auto;
  }
  .letter::-webkit-scrollbar{ width: 6px; }
  .letter::-webkit-scrollbar-thumb{ background: var(--rose); border-radius: 3px; }

  .letter-title{
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1.5rem;
    color: var(--gold);
    text-align: center;
    margin: 0 0 22px;
    letter-spacing: 0.5px;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .letter-title.in-view{ opacity: 1; }

  .letter-body{
    font-size: 1.08rem;
    line-height: 1.9;
    color: var(--blush);
  }
  .letter-body .stress{
    color: var(--rose);
    font-weight: 600;
  }

  /* typewriter line-by-line reveal */
  .reveal-p{
    margin: 0 0 20px;
  }
  .type-line{
    display: block;
    opacity: 0;
    white-space: pre-wrap;
    overflow: hidden;
    border-right: 2px solid transparent;
  }
  .type-line.typing{
    opacity: 1;
    border-right: 2px solid var(--gold);
    animation: caretBlink 0.8s steps(1) infinite;
  }
  .type-line.done{
    opacity: 1;
    border-right: 2px solid transparent;
  }
  @keyframes caretBlink{
    0%, 100%{ border-color: var(--gold); }
    50%{ border-color: transparent; }
  }

  .propose-line .stress.glow{
    display: inline-block;
    animation: proposeGlow 1.8s ease-in-out 0.15s 2;
  }
  @keyframes proposeGlow{
    0%, 100%{ text-shadow: 0 0 0 rgba(224,116,143,0); }
    50%{ text-shadow: 0 0 16px rgba(224,116,143,0.85); }
  }
  .signoff{
    margin-top: 28px;
    text-align: right;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: var(--gold);
    font-size: 1.15rem;
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  .signoff.in-view{ opacity: 1; }

  .close-btn{
    position: absolute;
    top: 12px;
    right: 16px;
    background: none;
    border: none;
    color: var(--gold);
    font-size: 1.3rem;
    cursor: pointer;
    opacity: 0.7;
  }
  .close-btn:hover{ opacity: 1; }

  @media (prefers-reduced-motion: reduce){
    .hint, .spark{ animation: none; }
    .type-line{ transition: none; }
  }
</style>
</head>
<body>

<div class="stage" id="stage">
  <div class="bg-photo"></div>

  <div class="scratch-wrap" id="scratchWrap">
    <div class="card">
      <div class="card-top">
        <span>Personal Card</span>
        <span>1 of 1</span>
      </div>
      <div class="card-panel">
        <div class="hidden-text">something for you<br>is under here</div>
        <canvas id="scratchCanvas"></canvas>
      </div>
    </div>
  </div>

 <div class="letter" id="letter">
  <button class="close-btn" id="closeBtn" aria-label="close">✕</button>

  <p class="letter-title" id="letterTitle">Gundamaa</p>

  <div class="letter-body" id="letterBody">
    <!-- lines are typed in one by one by JS, using the data below -->
  </div>

  <p class="signoff" id="signoff">&mdash; Vetri❤️</p>
</div>

</div>

<script>
  const stage = document.getElementById('stage');
  const scratchWrap = document.getElementById('scratchWrap');
  const letter = document.getElementById('letter');
  const letterTitle = document.getElementById('letterTitle');
  const letterBody = document.getElementById('letterBody');
  const signoff = document.getElementById('signoff');
  const closeBtn = document.getElementById('closeBtn');

  // ambient floating particles
  const symbols = ['✦','✧','·'];
  for(let i=0;i<16;i++){
    const s = document.createElement('div');
    s.className = 'spark';
    s.textContent = symbols[Math.floor(Math.random()*symbols.length)];
    s.style.left = Math.random()*100 + 'vw';
    s.style.animationDelay = (Math.random()*9) + 's';
    s.style.animationDuration = (7 + Math.random()*6) + 's';
    s.style.fontSize = (10 + Math.random()*14) + 'px';
    stage.appendChild(s);
  }

  // --- letter content, split into lines. Each line is an array of
  // segments: plain text or { stress: true, text: '...' }
  const paragraphs = [
    [
      { text: "Senior, idha eppadi sollrathunu romba naala yosichittu irundhen. Neenga idha eppadi eduthupeenga nu kooda theriyala. Aana en manasula irukkuradha sollama irukka mudiyala." }
    ],
    [
      { text: "First time ungala paatha thula irundhe aramichiduchu. Namma pesunadhu, M88T bus-la onna ponadhum, neenga enga veetukku vandhadhu, naan ungala paaka vandhadhu, gift kuduthadhu... indha ella memories-um enakku oru kanavu maari irukku." }
    ],
    [
      { text: "Neenga oru thadava dhaan enga veetukku vandheenga, aana enakku neenga daily en life-la irukkinga nu oru feeling irukkum." }
    ],
    [
      { text: "Mudhala idhu oru crush nu dhaan nenachen. Aana eppo adhu " },
      { text: "love-a maaruchunu", stress: true },
      { text: " enakke theriyala." }
    ],
    [
      { text: "Nerla sollanum-nu neraya thadava nenachen. Aana oru oru thadavaiyum oru thadangal vandhudum. Adhanala dhaan ippo message pannuren." }
    ],
    [
      { text: "Sharmi, enakku " },
      { text: "ungala romba pidikkum.", stress: true },
      { text: " Ungala love panren nu solli kasta padutha virumbula. En future pathi yosikkum pothu, en pakkathula " },
      { text: "neenga irundha dhaan adhu completea irukkum nu enakku thonudhu.", stress: true, propose: true }
    ],
    [
      { text: "Idhu varaikkum yaarukum propose pannadhu illa. yen olunga kuda pesamatey, Aana unga kitta enakku oru comfort irukku, adhanala dhaan dhairiyama soldren." }
    ]
  ];

  // build empty paragraph/line elements up front (so layout/scroll works),
  // text gets typed into each line span in sequence
  const lineQueue = []; // flat list of { el, segments }

  paragraphs.forEach(segments => {
    const p = document.createElement('p');
    p.className = 'reveal-p';
    const span = document.createElement('span');
    span.className = 'type-line';
    p.appendChild(span);
    letterBody.appendChild(p);
    lineQueue.push({ el: span, segments, p });
  });

  function typeSegmentsInto(el, segments, onDone){
    // flatten segments into a list of {char, stress, propose}
    const chars = [];
    segments.forEach(seg => {
      for(const ch of seg.text){
        chars.push({ ch, stress: !!seg.stress, propose: !!seg.propose });
      }
    });

    let i = 0;
    let currentSpan = null;
    let currentStress = null;

    function typeChar(){
      if(i >= chars.length){
        el.classList.remove('typing');
        el.classList.add('done');
        // trigger glow if this line had the proposal phrase
        const glowTarget = el.querySelector('.stress[data-propose="1"]');
        if(glowTarget){
          glowTarget.classList.add('glow');
          burstHearts();
        }
        onDone();
        return;
      }
      const c = chars[i];
      if(c.stress){
        if(currentStress === null){
          currentSpan = document.createElement('span');
          currentSpan.className = 'stress';
          if(c.propose) currentSpan.setAttribute('data-propose','1');
          el.appendChild(currentSpan);
          currentStress = currentSpan;
        }
        currentStress.textContent += c.ch;
      } else {
        currentStress = null;
        el.appendChild(document.createTextNode(c.ch));
      }
      i++;
      // slower, more readable handwriting pace
      const delay = 45 + Math.random()*40;
      setTimeout(typeChar, delay);
    }

    el.classList.add('typing');
    typeChar();
  }

  function startTyping(){
    letterTitle.classList.add('in-view');
    let idx = 0;
    function next(){
      if(idx >= lineQueue.length){
        setTimeout(() => signoff.classList.add('in-view'), 300);
        return;
      }
      const item = lineQueue[idx];
      item.p.style.opacity = '1';
      typeSegmentsInto(item.el, item.segments, () => {
        idx++;
        setTimeout(next, 500); // pause between lines/paragraphs
      });
    }
    setTimeout(next, 400);
  }

  let burstDone = false;
  function burstHearts(){
    if(burstDone) return;
    burstDone = true;
    for(let i=0;i<14;i++){
      const h = document.createElement('div');
      h.textContent = '♥';
      h.style.position = 'fixed';
      h.style.left = (45 + Math.random()*10) + 'vw';
      h.style.bottom = '10vh';
      h.style.fontSize = (14 + Math.random()*16) + 'px';
      h.style.color = 'var(--rose)';
      h.style.opacity = '0.9';
      h.style.pointerEvents = 'none';
      h.style.zIndex = '10';
      h.style.transition = 'transform 1.8s ease-out, opacity 1.8s ease-out';
      document.body.appendChild(h);
      requestAnimationFrame(() => {
        h.style.transform = `translate(${(Math.random()-0.5)*160}px, -${220 + Math.random()*160}px) scale(${0.8 + Math.random()*0.8})`;
        h.style.opacity = '0';
      });
      setTimeout(() => h.remove(), 2000);
    }
  }

  const canvas = document.getElementById('scratchCanvas');
  const ctx = canvas.getContext('2d');
  let revealed = false;

  function sizeCanvas(){
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    drawCoating();
  }

  function drawCoating(){
    const w = canvas.width, h = canvas.height;
    const grad = ctx.createLinearGradient(0, 0, w, h);
    grad.addColorStop(0, '#c9c9cf');
    grad.addColorStop(0.5, '#a9a9b2');
    grad.addColorStop(1, '#c9c9cf');
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
    for(let i=0;i<900;i++){
      ctx.fillStyle = `rgba(255,255,255,${Math.random()*0.06})`;
      ctx.fillRect(Math.random()*w, Math.random()*h, 2, 2);
    }
    ctx.fillStyle = '#5a5a63';
    ctx.font = '600 15px Lora, serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('S C R A T C H   H E R E', w/2, h/2);
  }

  let scratching = false;
  let scratchStartTime = null;

  function getPos(e){
    const rect = canvas.getBoundingClientRect();
    const point = e.touches ? e.touches[0] : e;
    return {
      x: (point.clientX - rect.left) * (canvas.width / rect.width),
      y: (point.clientY - rect.top) * (canvas.height / rect.height)
    };
  }

  function scratchAt(x, y){
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(x, y, 22, 0, Math.PI * 2);
    ctx.fill();
  }

  function checkPercentScratched(){
    const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
    let cleared = 0;
    const total = data.length / 4;
    for(let i = 3; i < data.length; i += 4 * 8){
      if(data[i] < 40) cleared++;
    }
    const sampled = total / 8;
    const percent = cleared / sampled;
    if(percent > 0.5 && !revealed){
      revealed = true;
      const elapsed = scratchStartTime ? (Date.now() - scratchStartTime) : 0;
      const minDelay = 1000; // at least one full second of visible scratching
      const remaining = Math.max(0, minDelay - elapsed);
      setTimeout(openLetter, remaining);
    }
  }

  function startScratch(e){
    scratching = true;
    if(scratchStartTime === null) scratchStartTime = Date.now();
    const p = getPos(e);
    scratchAt(p.x, p.y);
  }
  function moveScratch(e){
    if(!scratching) return;
    e.preventDefault();
    const p = getPos(e);
    scratchAt(p.x, p.y);
    checkPercentScratched();
  }
  function endScratch(){
    scratching = false;
  }

  canvas.addEventListener('mousedown', startScratch);
  canvas.addEventListener('mousemove', moveScratch);
  window.addEventListener('mouseup', endScratch);
  canvas.addEventListener('touchstart', startScratch, { passive: true });
  canvas.addEventListener('touchmove', moveScratch, { passive: false });
  canvas.addEventListener('touchend', endScratch);

  window.addEventListener('resize', sizeCanvas);
  sizeCanvas();

  function openLetter(){
    canvas.style.transition = 'opacity 0.6s ease';
    canvas.style.opacity = '0';
    scratchWrap.classList.add('hide');
    setTimeout(() => {
      letter.classList.add('show');
      startTyping();
    }, 400);
  }

  closeBtn.addEventListener('click', () => {
    letter.classList.remove('show');
    setTimeout(() => {
      scratchWrap.classList.remove('hide');
      canvas.style.opacity = '1';
      revealed = false;
      scratchStartTime = null;
      sizeCanvas();
    }, 400);
  });
</script>

</body>
</html>
